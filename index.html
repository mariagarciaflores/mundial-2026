<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundial 2026 · Calendario, Resultados y Plantillas</title>
<meta name="description" content="Copa Mundial de la FIFA 2026: partidos por día en hora de España, Bolivia y más países, resultados en vivo, clasificaciones y plantillas completas.">
<link rel="icon" href="icons/icon-192.png" type="image/png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0b1120">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mundial 2026">
<link rel="preconnect" href="https://www.thesportsdb.com">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="topbar">
  <div class="brand">
    <span class="ball">⚽</span>
    <div>
      <h1 data-i18n="title">Mundial 2026</h1>
      <p class="sub" data-i18n="subtitle">Canadá · México · Estados Unidos</p>
    </div>
  </div>
  <div class="topbar-right">
    <button id="installBtn" class="install-btn hidden">📲 <span data-i18n="installApp">Instalar app</span></button>
    <span id="liveIndicator" class="live-indicator hidden"><span class="dot"></span><span data-i18n="live">EN VIVO</span></span>
    <span id="updatedAt" class="updated-at"></span>
    <select id="langSelect" class="lang-select" aria-label="Idioma">
      <option value="es">🇪🇸 Español</option>
      <option value="en">🇬🇧 English</option>
    </select>
  </div>
</header>

<nav class="tabs" role="tablist">
  <button class="tab active" data-view="matches" data-i18n="tabMatches">Partidos</button>
  <button class="tab" data-view="groups" data-i18n="tabGroups">Grupos</button>
  <button class="tab" data-view="knockout" data-i18n="tabKnockout">Eliminatorias</button>
  <button class="tab" data-view="teams" data-i18n="tabTeams">Equipos</button>
  <button class="tab tab-learn" data-view="learn" data-i18n="tabLearn">🎓 Aprende</button>
</nav>

<section class="tz-bar">
  <span class="tz-label" data-i18n="tzLabel">Horarios en:</span>
  <div id="tzChips" class="tz-chips"></div>
  <select id="tzAdd" class="tz-add"></select>
</section>

<main id="view"></main>

<div id="modal" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modal-backdrop"></div>
  <div class="modal-card">
    <button class="modal-close" aria-label="Cerrar">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<div id="iosBanner" class="ios-banner hidden">
  <span id="iosBannerText"></span>
  <button id="iosBannerClose" aria-label="Cerrar">✕</button>
</div>

<footer class="footer">
  <p data-i18n="footer">Datos: TheSportsDB y Wikipedia · Actualización automática cada 60 segundos · Hecho con ❤️ para el Mundial 2026</p>
</footer>

<script src="js/app.js"></script>
</body>
</html>
